name: Linux Desktop + VNC (localhost.run)

on:
  workflow_dispatch:

jobs:
  vnc-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Update system & Install packages
        run: |
          sudo apt update -y
          sudo apt install -y \
            xfce4 xfce4-goodies \
            x11vnc xvfb \
            novnc websockify \
            dbus-x11 tightvncserver \
            openssh-client

      - name: Setup VNC password
        run: |
          mkdir -p ~/.vnc
          x11vnc -storepasswd 123456 ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start Linux Desktop + VNC
        run: |
          export DISPLAY=:1
          Xvfb :1 -screen 0 1280x800x24 &
          sleep 3
          startxfce4 &
          x11vnc -display :1 -forever -shared -rfbport 5900 -rfbauth ~/.vnc/passwd -bg
          websockify --web=/usr/share/novnc/ 6080 localhost:5900 &

      - name: Expose via localhost.run (Free Public URL)
        run: |
          echo "⏳ جاري إنشاء رابط عام مجاني..."
          ssh -o StrictHostKeyChecking=no -R 80:localhost:6080 nokey@localhost.run

      - name: Keep session alive
        run: |
          echo "✅ Linux Desktop + VNC جاهز!"
          sleep infinity
